<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>StockPulse AI — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B1220;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .card {
      text-align: center;
      max-width: 320px;
      padding: 2.5rem 2rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(76, 191, 245, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    button {
      background: rgba(76, 191, 245, 0.15);
      color: #4CBFF5;
      border: 1px solid rgba(76, 191, 245, 0.25);
      border-radius: 12px;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: rgba(76, 191, 245, 0.25); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="55" width="18" height="35" rx="4" fill="#4CBFF5" opacity="0.7"/>
        <rect x="41" y="30" width="18" height="60" rx="4" fill="#4CBFF5" opacity="0.85"/>
        <rect x="72" y="10" width="18" height="80" rx="4" fill="#4CBFF5"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Market data requires an active internet connection.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
